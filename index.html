<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Apostas Regulamentadas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #e2e2e2;
            font-family: 'Inter', sans-serif;
        }
        .neon-border {
            box-shadow: 0 0 10px #a855f7, 0 0 20px #7c3aed;
        }
        .neon-text {
            text-shadow: 0 0 8px #a855f7;
        }
        .glass {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        .gradient-bg {
            background: radial-gradient(circle at top right, #2d1b4e 0%, #050505 50%);
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full text-center mb-12">
        <h1 class="text-5xl font-bold mb-4 neon-text text-purple-500 uppercase tracking-tighter">BetCheck Federal</h1>
        <p class="text-gray-400 text-lg">Verifique se uma plataforma de apostas está autorizada pelo Governo Federal.</p>
    </div>

    <!-- Barra de Busca -->
    <div class="max-w-2xl w-full glass p-2 rounded-2xl flex items-center mb-8 neon-border">
        <input type="text" id="searchInput" placeholder="CNPJ, Razão Social ou Nome Fantasia..." 
               class="w-full bg-transparent p-4 outline-none text-white text-lg" onkeypress="handleEnter(event)">
        <button onclick="buscarEmpresa()" class="bg-purple-600 hover:bg-purple-500 text-white px-8 py-4 rounded-xl font-bold transition-all">
            PESQUISAR
        </button>
    </div>

    <!-- Container de Resultado -->
    <div id="resultArea" class="max-w-2xl w-full hidden">
        <!-- O resultado será injetado aqui via JS -->
    </div>

    <footer class="mt-20 text-gray-600 text-sm">
        Dados atualizados conforme Portaria SPA/MF 2024-2026.
    </footer>

    <script>
        let baseDados = [];

        // Carrega os dados do seu JSON (você fará o upload desse dados.json no github)
        fetch('dados.json')
            .then(res => res.json())
            .then(data => baseDados = data);

        function handleEnter(e) {
            if (e.key === 'Enter') buscarEmpresa();
        }

        function limparCnpj(cnpj) {
            return cnpj.replace(/\D/g, '');
        }

        function buscarEmpresa() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const inputLimpo = limparCnpj(input);
            const resultArea = document.getElementById('resultArea');
            
            resultArea.classList.remove('hidden');
            resultArea.innerHTML = ""; // Limpa busca anterior

            // Busca na base de dados
            const resultado = baseDados.find(item => {
                return (
                    limparCnpj(item.cnpj).includes(inputLimpo && inputLimpo !== "" ? inputLimpo : "XYZ789") || 
                    item.razao_social.toLowerCase().includes(input) || 
                    item.marcas.toLowerCase().includes(input)
                );
            });

            if (resultado) {
                resultArea.innerHTML = `
                    <div class="glass p-8 rounded-3xl border-l-8 border-green-500 animate-pulse">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-green-500 text-black px-3 py-1 rounded-full text-xs font-bold uppercase">Regulamentada</span>
                        </div>
                        <h2 class="text-3xl font-bold text-white mb-2">${resultado.razao_social}</h2>
                        <p class="text-gray-400 mb-4">CNPJ: ${resultado.cnpj}</p>
                        <div class="border-t border-gray-800 pt-4">
                            <p class="text-purple-400 font-bold">Portaria de Autorização:</p>
                            <p class="text-white text-lg">${resultado.portaria}</p>
                        </div>
                        <div class="mt-4">
                            <p class="text-gray-500 text-sm italic">Marcas: ${resultado.marcas}</p>
                        </div>
                    </div>
                `;
            } else {
                resultArea.innerHTML = `
                    <div class="glass p-8 rounded-3xl border-l-8 border-red-600">
                        <span class="bg-red-600 text-white px-3 py-1 rounded-full text-xs font-bold uppercase">Não Encontrada</span>
                        <h2 class="text-2xl font-bold text-white mt-4">Atenção!</h2>
                        <p class="text-gray-400 mt-2">Esta empresa não consta na lista oficial de autorizações nacionais para 2025/2026.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
