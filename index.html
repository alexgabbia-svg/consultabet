<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparência Apostas | Federal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050508 radial-gradient(circle at top, #1a0b2e 0%, #050508 70%); font-family: 'Rajdhani', sans-serif; color: #f3f4f6; }
        .neon-purple { color: #bc13fe; text-shadow: 0 0 12px #bc13fe; }
        .neon-border { border: 1px solid #bc13fe; box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
        .glass-card { background: rgba(18, 18, 24, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-16">

    <header class="text-center mb-16">
        <h1 class="text-5xl md:text-7xl font-cyber font-bold tracking-tighter mb-4 italic">
            SIGAP <span class="neon-purple">CHECK</span>
        </h1>
        <p class="text-gray-400 text-lg uppercase tracking-widest font-semibold">Consulta Nacional de Empresas Regulamentadas</p>
    </header>

    <div class="w-full max-w-3xl">
        <div class="glass-card p-2 rounded-2xl flex items-center shadow-2xl">
            <input type="text" id="searchInput" 
                   placeholder="Digite Marca (ex: Bet365), CNPJ ou Razão Social..." 
                   class="w-full bg-transparent p-5 outline-none text-white text-xl md:text-2xl placeholder-gray-600 font-bold"
                   onkeypress="if(event.key === 'Enter') buscar()">
            <button onclick="buscar()" 
                    class="bg-purple-700 hover:bg-purple-600 text-white px-10 py-5 rounded-xl font-bold transition-all font-cyber tracking-widest">
                BUSCAR
            </button>
        </div>
        <p class="text-center text-gray-500 text-xs mt-6 italic uppercase tracking-widest">Base de dados atualizada conforme planilhas oficiais 2024-2026</p>
    </div>

    <div id="resultArea" class="w-full max-w-3xl mt-16 transition-all duration-500"></div>

    <script>
        let empresas = [];

        fetch('dados.json')
            .then(res => res.json())
            .then(data => empresas = data);

        function normalize(txt) {
            return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\w]/g, '');
        }

        function buscar() {
            const termo = document.getElementById('searchInput').value;
            const termoLimpo = normalize(termo);
            const container = document.getElementById('resultArea');

            if (termoLimpo.length < 2) return;

            const match = empresas.find(e => 
                normalize(e.cnpj).includes(termoLimpo) || 
                normalize(e.razao_social).includes(termoLimpo) || 
                normalize(e.marcas).includes(termoLimpo)
            );

            if (match) {
                container.innerHTML = `
                    <div class="glass-card p-10 rounded-3xl border-l-8 border-purple-500 animate-pulse">
                        <div class="flex items-center gap-3 mb-8">
                            <span class="w-3 h-3 bg-green-400 rounded-full shadow-[0_0_15px_#4ade80]"></span>
                            <span class="text-green-400 font-bold uppercase tracking-tighter">✔ Regulamentada pelo Governo Federal</span>
                        </div>
                        <h2 class="text-4xl md:text-5xl font-bold mb-3">${match.razao_social}</h2>
                        <p class="text-purple-400 text-2xl font-bold mb-8">${match.cnpj}</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-white/10 pt-8">
                            <div>
                                <span class="text-gray-500 text-xs uppercase block mb-2 font-bold tracking-widest">Portaria de Autorização</span>
                                <span class="text-white text-xl font-bold italic leading-tight">${match.portaria}</span>
                            </div>
                            <div>
                                <span class="text-gray-500 text-xs uppercase block mb-2 font-bold tracking-widest">Marcas do Grupo</span>
                                <span class="text-white text-xl font-bold italic leading-tight">${match.marcas}</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="glass-card p-10 rounded-3xl border-l-8 border-red-600">
                        <h2 class="text-red-600 font-cyber text-3xl font-bold mb-4">NÃO LOCALIZADA</h2>
                        <p class="text-gray-400 text-lg">Esta marca ou CNPJ não foi encontrado na lista de empresas autorizadas a operar nacionalmente a partir de 2025.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
